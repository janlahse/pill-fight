<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PILL FIGHT</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="icon-modified.png">
</head>
<body>
  <div class="screen-too-small">
    <div class="screen-too-small-box">
      <div class="screen-too-small-title">PILL FIGHT</div>
      <p>Dieses Spiel braucht einen größeren Bildschirm.<br>Bitte auf einem Gerät mit mindestens 900px Breite öffnen.</p>
    </div>
  </div>

  <div class="game-wrapper">
    <div class="canvas-container">
      <canvas id="gameCanvas" width="900" height="520"></canvas>
    </div>
    <div class="controls">
      <div class="controls-card p1">
        <span class="controls-label">SPIELER 1</span>
        <span>Bewegen: <kbd>W</kbd><kbd>A</kbd><kbd>S</kbd><kbd>D</kbd></span>
        <span>Angriff: <kbd>SPACE</kbd> + Richtung</span>
      </div>
      <div class="controls-card p2">
        <span class="controls-label">SPIELER 2</span>
        <span>Bewegen: <kbd>↑</kbd><kbd>←</kbd><kbd>↓</kbd><kbd>→</kbd></span>
        <span>Angriff: <kbd>ENTER</kbd> + Richtung</span>
      </div>
    </div>
  </div>
  <script src="game.js"></script>
</body>
</html>
